@let movie = this.movie();
<section class="detail">
  <header class="detail__nav">
    <button mat-button class="detail__back" (click)="back.emit()">
      <mat-icon>arrow_back</mat-icon>
      Volver
    </button>
  </header>

  <div class="detail__hero" [style.--detail-image]="'url(' + movie.imagen + ')'">
    <div class="detail__scrim"></div>
    <div class="detail__hero-content">
      <h1 class="detail__title">{{ movie.titulo }}</h1>
      <div class="detail__meta">
        <span class="detail__rating">{{ movie.puntuacionMedia | ratingPercent }}</span>
        <span>{{ movie.anioEstreno }}</span>
        <span>{{ movie.duracion }} min</span>
      </div>
      <mat-chip-set class="detail__chips">
        @for (genero of movie.generos; track genero) {
          <mat-chip>{{ genero }}</mat-chip>
        }
      </mat-chip-set>
    </div>
  </div>

  <div class="detail__body">
    <div class="detail__poster-col">
      <img class="detail__poster" [src]="movie.imagen" [alt]="movie.titulo" loading="eager" />
    </div>
    <div class="detail__info-col">
      <p class="detail__director">
        <strong>Director:</strong> {{ movie.director }}
      </p>
      <p class="detail__description">{{ movie.descripcion }}</p>
      <div class="detail__actions">
        <button mat-raised-button color="primary" matTooltip="Reproducir tráiler">
          <mat-icon>play_arrow</mat-icon>
          Reproducir
        </button>
        <button mat-stroked-button matTooltip="Añadir a mi lista">
          <mat-icon>add</mat-icon>
          Mi lista
        </button>
      </div>
    </div>
  </div>
</section>
